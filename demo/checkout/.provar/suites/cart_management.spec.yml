name: cart_management
graph:
  info: Complex cart manipulation before checkout
  start: action_init1
  nodes:
    action_init1:
      title: Open Store
      info: Navigate to store
      next: action_addap
    action_addap:
      title: Add Apple
      info: Add "Organic Honeycrisp Apple" to cart
      next: action_addba
    action_addba:
      title: Add Banana
      info: Add "Fair Trade Bananas" to cart
      next: action_gochk
    action_gochk:
      title: Go to Checkout
      info: Click Checkout button
      next: action_remap
    action_remap:
      title: Remove Apple
      info: Click the remove/delete button for Apples in the order summary
      asserts:
        assert_tota1:
          title: Total Updated
          info: Verify that the total reflects only the price of bananas
      next: action_purch
    action_purch:
      title: Complete Purchase
      info: Fill details and complete purchase
