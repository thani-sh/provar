name: guest_checkout
graph:
  info: Complete a purchase as a guest user
  start: action_init1
  nodes:
    action_init1:
      title: Open Store
      info: Navigate to the Fresh Harvest store
      next: action_addit
    action_addit:
      title: Add Apple
      info: Click "Add to Cart" for the "Organic Honeycrisp Apple"
      next: action_gochk
    action_gochk:
      title: Go to Checkout
      info: Click the "Checkout" button in the sidebar
      next: action_filla
    action_filla:
      title: Fill Shipping
      info: Enter name, email, and address in the checkout form
      next: action_fillp
    action_fillp:
      title: Fill Payment
      info: Enter mock card details (Number, Expiry, CVV)
      next: action_purch
    action_purch:
      title: Complete Purchase
      info: Click "Complete Purchase"
      asserts:
        assert_conf1:
          title: Order Confirmed
          info: Verify that the confirmation page is shown with an order ID
