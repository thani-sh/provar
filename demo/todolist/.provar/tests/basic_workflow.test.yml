name: basic_workflow
graph:
  info: Simple login and task creation workflow
  start: task_init1
  nodes:
    task_init1:
      title: open app
      info: Navigate to the todo list application
      next: task_logi1
    task_logi1:
      title: login
      info: Enter username "testuser" and click Login
      next: task_clis1
      config:
        visualCompare: false
    task_clis1:
      title: create list
      info: Enter "Shopping" in the new list input and click Add List
      next: task_atask
    task_atask:
      title: add task
      info: Enter "Buy Milk" in the task input and click Add Task
      next: task_compt
    task_compt:
      title: complete task
      info: Click the checkbox next to "Buy Milk"
      config:
        visualCompare: true
