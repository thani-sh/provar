name: Validate changes

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    name: build / lint / test (@libs/*)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Scope the checks to the @libs/* workspace packages. The apps under
      # apps/* are not unit-testable here: provar-app bundles macOS-only
      # binaries via electrobun, and provar-web needs the SvelteKit check
      # step that we don't gate on. Add a separate workflow for those
      # if/when the team wants them in PR gating.
      - name: Build (@libs/*)
        run: bun --filter '@libs/*' build

      - name: Lint (@libs/*)
        run: bun --filter '@libs/*' lint

      - name: Test (@libs/*)
        run: bun --filter '@libs/*' test
