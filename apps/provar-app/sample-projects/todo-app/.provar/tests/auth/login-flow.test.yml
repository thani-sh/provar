name: "Sample Todo App"
graph:
  info: "End-to-end smoke test for the bundled sample project. Logs in, creates a todo, marks it done, and logs out."
  start: "task_a1b2c"
  nodes:
    task_a1b2c:
      title: "Open the login form"
      info: "Navigate to the app and open the auth overlay in login mode."
      next: "task_d3e4f"
    task_d3e4f:
      title: "Sign in with the sample credentials"
      info: "Use the username and password from .provar/config.yml and submit. Verify the home feed is shown."
      next: "task_g5h6i"
    task_g5h6i:
      title: "Create a new todo"
      info: "Click the New Todo button, type a short title, and save. Verify the todo appears in the list."
      next: "task_j7k8l"
    task_j7k8l:
      title: "Mark the todo as done"
      info: "Click the checkbox on the todo you just created. Verify the row is visually marked complete and the count updates."
      next: "task_m9n0p"
    task_m9n0p:
      title: "Sign out"
      info: "Open the profile menu and click Sign out. Verify the user is returned to the login screen."
