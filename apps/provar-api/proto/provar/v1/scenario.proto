// ScenarioService reads and validates scenario files. Phase 2 surface is
// read-only (Get, Validate); Save lands in a later phase once the
// proto<->domain converter pattern has been validated.
syntax = "proto3";

package provar.v1;

import "provar/v1/common.proto";

option go_package = "github.com/thani-sh/provar/apps/provar-api/gen/provar/v1;provarv1";

service ScenarioService {
  rpc Get(GetRequest) returns (Scenario);
  rpc Validate(ValidateRequest) returns (ValidationResult);
}

message GetRequest {
  string project_path = 1;
  string file_path = 2;
}

message Scenario {
  string path = 1;
  repeated Action actions = 2;
}

message Action {
  string id = 1;
  string name = 2;
  string info = 3;
  repeated string next = 4;
}

message ValidateRequest {
  string project_path = 1;
}

message ValidationResult {
  bool valid = 1;
  repeated ValidationError errors = 2;
}

message ValidationError {
  string path = 1;
  string message = 2;
}