// UtilityService runs diagnostic and housekeeping operations that don't fit
// the project/run shape. Doctor checks the local environment (settings,
// browser); Clean removes generated artifacts from a project. Both are
// unary RPCs — no streaming.
syntax = "proto3";

package provar.v1;

import "provar/v1/common.proto";

option go_package = "github.com/thani-sh/provar/apps/provar-api/gen/provar/v1;provarv1";

service UtilityService {
  rpc Doctor(DoctorRequest) returns (DoctorReport);
  rpc Clean(CleanRequest) returns (CleanReport);
}

message DoctorRequest {
  // Optional project path to check. When empty, doctor skips the
  // "project exists" check and just validates settings + browser.
  string project_path = 1;
}

message DoctorReport {
  bool all_passed = 1;
  repeated DoctorCheck checks = 2;
}

message DoctorCheck {
  string name = 1;
  bool passed = 2;
  // Error message when passed=false. Empty on success.
  string error = 3;
}

message CleanRequest {
  string project_path = 1;
  // Include .provar/baselines/ in the removal set. Off by default so
  // a careless clean doesn't blow away accepted baselines.
  bool include_baselines = 2;
  // Include compiled .test.lua files in the removal set. Off by default
  // so a clean doesn't force a recompile.
  bool include_lua = 3;
  // When true, no filesystem changes are made — the report lists what
  // would have been removed.
  bool dry_run = 4;
}

message CleanReport {
  repeated CleanAction actions = 1;
}

message CleanAction {
  string label = 1;
  string path = 2;
  bool removed = 3;
  // Error message when removed=false. Empty on success; populated when
  // the path didn't exist, dry-run skipped it, or removal failed.
  string error = 4;
}