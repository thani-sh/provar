// RunService executes a compiled scenario and streams per-task events.
// The same event shape is also surfaced via AcceptBaseline so the editor
// can promote just-saved screenshots to baselines after a successful run.
syntax = "proto3";

package provar.v1;

import "provar/v1/common.proto";

option go_package = "github.com/thani-sh/provar/apps/provar-api/gen/provar/v1;provarv1";

service RunService {
  rpc Run(RunRequest) returns (stream RunEvent);
  rpc AcceptBaseline(AcceptBaselineRequest) returns (BaselineResult);
}

message RunRequest {
  string project_path = 1;
  string file_path = 2;
  bool headless = 3;
  string up_to = 4;
  string from = 5;
}

message AcceptBaselineRequest {
  string project_path = 1;
  string file = 2;
}

message BaselineResult {
  int32 accepted = 1;
}

// RunEvent is a oneof over the lifecycle events emitted by a run job.
// Visual events carry the just-captured PNG so the editor can show it
// inline alongside the task that produced it.
message RunEvent {
  oneof event {
    RunStarted run_started = 1;
    TaskStarted task_started = 2;
    TaskFinished task_finished = 3;
    TaskFailed task_failed = 4;
    VisualComparisonTriggered visual_comparison_triggered = 5;
    RunFinished run_finished = 6;
  }
}

message RunStarted {}

message TaskStarted {
  string task_id = 1;
  string title = 2;
}

message TaskFinished {
  string task_id = 1;
}

message TaskFailed {
  string task_id = 1;
  string error = 2;
}

message VisualComparisonTriggered {
  string task_id = 1;
  string screenshot_base64 = 2;
  // Result of comparing the just-captured screenshot against the
  // baseline (if any). The runner does not produce this value — the API
  // computes it after saving the screenshot.
  VisualComparisonResult result = 3;
}

enum VisualComparisonResult {
  VISUAL_COMPARISON_RESULT_UNSPECIFIED = 0;
  VISUAL_COMPARISON_RESULT_FIRST_RUN = 1;
  VISUAL_COMPARISON_RESULT_MATCH = 2;
  VISUAL_COMPARISON_RESULT_DIFF = 3;
}

message RunFinished {
  JobStatus status = 1;
  string duration = 2;
  string error = 3;
}