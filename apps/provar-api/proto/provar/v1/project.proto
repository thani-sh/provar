// ProjectService reads and creates projects on disk. Phase 2 surface is
// read-only (Open, Init, List); write paths land in a later phase.
syntax = "proto3";

package provar.v1;

import "provar/v1/common.proto";

option go_package = "github.com/thani-sh/provar/apps/provar-api/gen/provar/v1;provarv1";

service ProjectService {
  rpc Open(OpenRequest) returns (Project);
  rpc Init(InitRequest) returns (Project);
  rpc List(ListRequest) returns (ListResponse);
}

message OpenRequest {
  string path = 1;
}

message InitRequest {
  string target = 1;
  bool use_sample = 2;
  bool force = 3;
}

message ListRequest {
  string path = 1;
}

message Project {
  string path = 1;
  map<string, string> vars = 2;
  repeated File files = 3;
  BrowserConfig browser = 4;
}

message BrowserConfig {
  int32 width = 1;
  int32 height = 2;
}

message File {
  string path = 1;
}

message ListResponse {
  string path = 1;
  repeated File files = 2;
}