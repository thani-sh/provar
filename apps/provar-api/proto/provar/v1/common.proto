// Package provar.v1 holds shared types used across the provar API.
//
// Versioning: breaking changes go in a new package (provar.v2); in-package
// changes must be additive (new fields, new RPCs, new enum values).
syntax = "proto3";

package provar.v1;

option go_package = "github.com/thani-sh/provar/apps/provar-api/gen/provar/v1;provarv1";

// JobStatus mirrors libs/domain.JobStatus for use in streaming RPC
// terminal events. The domain package is the source of truth; the proto
// representation exists so wire clients don't need to import Go types.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_RUNNING = 1;
  JOB_STATUS_COMPLETED = 2;
  JOB_STATUS_FAILED = 3;
  JOB_STATUS_STOPPED = 4;
}