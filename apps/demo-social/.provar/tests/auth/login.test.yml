name: "User Login"
graph:
  info: "Verifies that invalid credentials show an error and that valid credentials land the user on the home feed, followed by a logout."
  start: "task_l1o2g"
  nodes:
    task_l1o2g:
      title: "Open the login form"
      info: "Navigate to the app and open the auth overlay in login mode."
      next:
        - "task_l3b4d"
        - "task_l5c6e"
    task_l3b4d:
      title: "Submit with wrong password and verify error"
      info: "Enter the default test account username with a wrong password, submit, and verify an error message appears."
      next: "task_l5c6e"
    task_l5c6e:
      title: "Login with valid credentials"
      info: "Enter the default test account credentials and submit. Verify the home feed is shown."
      next: "task_l7d8f"
    task_l7d8f:
      title: "Logout"
      info: "Navigate to the profile page and click Logout. Verify the user is returned to the global feed."
