name: "Follow User and Home Feed Filtering"
graph:
  info: "Verifies that following a user causes their posts to appear in the Home feed, and that unfollowing removes them."
  start: "task_fw0a1"
  nodes:
    task_fw0a1:
      title: "Register a second user to follow"
      info: "Navigate to the app. Register a new account with a unique username to act as the user to be followed. After registration, create a post as that user, then log out."
      next: "task_fw2b3"
    task_fw2b3:
      title: "Login as the main test user"
      info: "Login with the default test account."
      next: "task_fw4c5"
    task_fw4c5:
      title: "Follow the second user from the global feed"
      info: "Open the global feed, find a post by the second user, click their username to open their profile, then click Follow."
      next: "task_fw6d7"
    task_fw6d7:
      title: "Verify the Home feed shows their post"
      info: "Navigate to the Home feed and verify a post from the followed user is visible."
      next: "task_fw8e9"
    task_fw8e9:
      title: "Unfollow and verify feed is cleared"
      info: "Go back to the followed user's profile and click Unfollow. Return to the Home feed and verify their posts no longer appear."
